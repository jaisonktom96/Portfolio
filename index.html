<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Jaison Thomas: product and UX design portfolio. Human-centered systems for engagement, analytics, and journeys."
    />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#0d0d0d" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Jaison Thomas, Product Designer" />
    <meta property="og:description" content="Human-centered systems for engagement, analytics, and journeys. Portfolio of Jaison Thomas." />
    <meta property="og:site_name" content="Jaison Thomas" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Jaison Thomas, Product Designer" />
    <meta name="twitter:description" content="Human-centered systems for engagement, analytics, and journeys." />

    <!-- Discourage stale HTML/JS when iterating locally -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <title>Jaison Thomas · Portfolio</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/portfolio-entry.tsx"></script>
    <!--
      Last in document + !important: wins over cached / HMR-injected CSS from Vite.
      Original design was 52px; +50% = 78px. Edit here if you change thumb size again.
    -->
    <style id="outside-work-thumb-critical">
      .site.theme-figma button.figma-outside-work-thumb {
        width: 78px !important;
        height: 78px !important;
        min-width: 78px !important;
        min-height: 78px !important;
        flex-shrink: 0 !important;
        box-sizing: border-box !important;
      }
      .site.theme-figma button.figma-outside-work-thumb img {
        max-width: none !important;
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
      }
    </style>
  </body>
</html>
